# Server Port
server.port=8080

# H2 Database Configuration (Database In-Memory untuk testing)
spring.datasource.url=jdbc:h2:mem:pcbookingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate (Otomatis membuat tabel berdasarkan model)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Bisa diakses di http://localhost:8080/h2-console)
spring.h2.console.enabled=true
