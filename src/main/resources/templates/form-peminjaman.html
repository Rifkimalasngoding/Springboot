<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Peminjaman PC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-4">
            <h4>🖥️ PC Lendaway</h4>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/form-peminjaman">Pinjam PC</a></li>
                <li class="nav-item"><a class="nav-link" href="/list-pc">Status PC</a></li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h2>Buat Transaksi Peminjaman</h2>
            <hr>
            
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card shadow-sm col-md-6">
                <div class="card-body">
                    <form action="/transaksi/pinjam" method="post">
                        <div class="mb-3">
                            <label>Pilih PC Tersedia</label>
                            <select name="kodePC" class="form-select" required>
                                <option value="">-- Pilih --</option>
                                <option th:each="pc : ${listPc}" th:if="${pc.status == 'TERSEDIA'}" 
                                        th:value="${pc.kodePC}" th:text="${pc.kodePC}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>NIM Mahasiswa</label>
                            <input type="text" name="nim" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Nama Mahasiswa</label>
                            <input type="text" name="nama" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Durasi (Jam)</label>
                            <input type="number" name="durasi" class="form-control" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label>Keperluan</label>
                            <textarea name="keperluan" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Simpan Transaksi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
